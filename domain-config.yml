## Vercel 配置步骤

1. 登录 Vercel Dashboard: https://vercel.com/dashboard
2. 选择项目: medroundtable-v2
3. 点击 Settings → Domains
4. 添加域名: medroundtable.vip
5. 点击 Add
6. 按提示配置 DNS（使用上面的配置）
7. 等待 SSL 证书自动颁发（约1-2分钟）

## 验证命令

### 检查 DNS 解析
```bash
nslookup medroundtable.vip
dig medroundtable.vip
```

### 检查域名是否生效
```bash
curl -I http://medroundtable.vip
```

### 检查 SSL 证书
```bash
openssl s_client -connect medroundtable.vip:443 -servername medroundtable.vip
```

## 配置文件示例（阿里云 DNS）

```json
{
  "domain": "medroundtable.vip",
  "records": [
    {
      "type": "A",
      "name": "@",
      "value": "76.76.21.21",
      "ttl": 600
    },
    {
      "type": "CNAME",
      "name": "www",
      "value": "cname.vercel-dns.com",
      "ttl": 600
    }
  ]
}
```

## 备案信息（如需要）

如果使用国内服务器，需要填写：
- 主办单位: 个人/企业名称
- 网站名称: MedRoundTable 医学科研协作平台
- 网站域名: medroundtable.vip
- 网站类型: 非交互式
- 服务器位置: 根据实际选择

注意：使用 Vercel/GitHub Pages 不需要备案
