# 配置目标: Vercel 部署

## DNS 解析配置（在阿里云/腾讯云后台添加）

### 基础配置
A记录:
  主机记录: @
  记录值: 76.76.21.21
  TTL: 600

CNAME记录:
  主机记录: www
  记录值: cname.vercel-dns.com
  TTL: 600

