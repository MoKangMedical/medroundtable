<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传数据库 - MedRoundTable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .drag-active { border-color: #10b981; background-color: #ecfdf5; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="./index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-green-600 to-teal-600 rounded-xl flex items-center justify-center text-white">
                        <i class="fas fa-database"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">MedRoundTable</h1>
                        <p class="text-xs text-slate-500">数据库上传</p>
                    </div>
                </a>
            </div>
            <a href="./data-dashboard.html" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition">
                <i class="fas fa-folder-open mr-1"></i> 数据管理
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-slate-900 mb-4">
                <i class="fas fa-table text-green-600 mr-2"></i>上传研究数据库
            </h2>
            <p class="text-slate-600 max-w-2xl mx-auto">
                上传您的研究数据，支持自动Schema解析和预览
            </p>
        </div>

        <div id="backendStatus" class="mb-6 rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 text-sm text-amber-800">
            <div class="flex items-start gap-3">
                <i class="fas fa-server mt-0.5 text-amber-500"></i>
                <div>
                    <p class="font-semibold">正在检查数据库上传服务</p>
                    <p id="backendStatusText" class="mt-1 text-amber-700">只有后端在线时，文件才会真正写入后台数据库并生成 Schema。</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Upload Form -->
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <!-- Drag & Drop Zone -->
                <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center cursor-pointer hover:border-green-400 transition mb-8">
                    <input type="file" id="fileInput" class="hidden" accept=".csv,.xlsx,.xls,.json,.sqlite,.db">
                    <div class="w-20 h-20 mx-auto mb-4 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-cloud-upload-alt text-4xl text-green-600"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-slate-800 mb-2">拖拽文件到此处</h3>
                    <p class="text-slate-500 mb-4">或点击选择文件</p>
                    <p class="text-sm text-slate-400">
                        支持格式: CSV, Excel (.xlsx/.xls), JSON, SQLite<br>
                        最大文件大小: 100MB
                    </p>
                </div>

                <!-- Selected File Info -->
                <div id="fileInfo" class="hidden mb-8 p-4 bg-green-50 rounded-xl border border-green-200">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-table text-green-600 text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p id="fileName" class="font-semibold text-slate-800"></p>
                            <p id="fileSize" class="text-sm text-slate-500"></p>
                        </div>
                        <button id="removeFile" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times-circle text-xl"></i>
                        </button>
                    </div>
                    <div id="progressContainer" class="hidden mt-4">
                        <div class="w-full bg-slate-200 rounded-full h-2">
                            <div id="progressBar" class="bg-green-600 h-2 rounded-full progress-bar" style="width: 0%"></div>
                        </div>
                        <p id="progressText" class="text-sm text-slate-500 mt-2 text-center">0%</p>
                    </div>
                </div>

                <!-- Form Fields -->
                <form id="uploadForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">
                            <i class="fas fa-tag mr-1 text-green-500"></i>数据库名称 *
                        </label>
                        <input type="text" id="name" required
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                            placeholder="请输入数据库名称">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">
                            <i class="fas fa-align-left mr-1 text-green-500"></i>数据库描述
                        </label>
                        <textarea id="description" rows="3"
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition resize-none"
                            placeholder="简要描述数据库内容和用途"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">
                                <i class="fas fa-link mr-1 text-green-500"></i>关联研究方案
                            </label>
                            <select id="protocolId"
                                class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white">
                                <option value="">-- 选择方案 --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">
                                <i class="fas fa-users mr-1 text-green-500"></i>关联圆桌会
                            </label>
                            <select id="roundtableId"
                                class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-white">
                                <option value="">-- 选择圆桌会 --</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" disabled
                        class="w-full py-4 bg-gradient-to-r from-green-600 to-teal-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-upload mr-2"></i>开始上传并解析
                    </button>
                </form>

                <div id="resultMessage" class="hidden mt-6 p-4 rounded-xl"></div>
            </div>

            <!-- Schema Preview -->
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6">
                    <i class="fas fa-eye text-blue-500 mr-2"></i>Schema预览
                </h3>
                
                <div id="schemaPlaceholder" class="text-center py-20 text-slate-400">
                    <i class="fas fa-table text-6xl mb-4"></i>
                    <p>上传文件后将自动解析Schema</p>
                </div>

                <div id="schemaContent" class="hidden">
                    <div class="mb-6 flex gap-4 text-sm">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full">
                            <i class="fas fa-columns mr-1"></i><span id="colCount">0</span> 列
                        </span>
                        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full">
                            <i class="fas fa-rows mr-1"></i><span id="rowCount">0</span> 行
                        </span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-4 py-3 text-left font-semibold text-slate-700">列名</th>
                                    <th class="px-4 py-3 text-left font-semibold text-slate-700">数据类型</th>
                                    <th class="px-4 py-3 text-left font-semibold text-slate-700">可空</th>
                                </tr>
                            </thead>
                            <tbody id="schemaTableBody" class="divide-y divide-slate-100">
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-6">
                        <h4 class="font-semibold text-slate-700 mb-3">数据预览（前5行）</h4>
                        <div id="dataPreview" class="overflow-x-auto border border-slate-200 rounded-xl">
                            <table class="w-full text-sm">
                                <thead id="previewHead" class="bg-slate-50"></thead>
                                <tbody id="previewBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-6 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2024 MedRoundTable · 全球首个A2A架构医学科研协作平台</p>
        </div>
    </footer>

    <script src="./api-config.js"></script>
    <script src="./local-upload-store.js"></script>
    <script>
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFile = document.getElementById('removeFile');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultMessage = document.getElementById('resultMessage');
        const schemaPlaceholder = document.getElementById('schemaPlaceholder');
        const schemaContent = document.getElementById('schemaContent');
        const colCount = document.getElementById('colCount');
        const rowCount = document.getElementById('rowCount');
        const schemaTableBody = document.getElementById('schemaTableBody');
        const previewHead = document.getElementById('previewHead');
        const previewBody = document.getElementById('previewBody');
        const backendStatus = document.getElementById('backendStatus');
        const backendStatusText = document.getElementById('backendStatusText');
        const api = window.MRTApiConfig;
        const localStore = window.MRTLocalUploadStore;

        let selectedFile = null;
        let backendAvailable = false;
        let latestSchemaSnapshot = null;

        // Drag & Drop Events
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

        function handleFile(file) {
            const allowedTypes = ['.csv', '.xlsx', '.xls', '.json', '.sqlite', '.db'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!allowedTypes.includes(ext)) {
                showResult('error', '不支持的文件类型');
                return;
            }
            if (file.size > 100 * 1024 * 1024) {
                showResult('error', '文件大小超过100MB限制');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.remove('hidden');
            updateSubmitState();

            // Parse and preview
            parseFile(file);
        }

        removeFile.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            schemaPlaceholder.classList.remove('hidden');
            schemaContent.classList.add('hidden');
            updateSubmitState();
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function parseFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (ext === 'csv') {
                parseCSV(file);
            } else if (['xlsx', 'xls'].includes(ext)) {
                // Excel parsing would require SheetJS library
                showSchemaPreview([
                    {name: 'id', type: 'integer', nullable: false},
                    {name: 'age', type: 'integer', nullable: true},
                    {name: 'gender', type: 'string', nullable: true}
                ], [
                    [1, 45, 'Male'],
                    [2, 32, 'Female'],
                    [3, 28, 'Male']
                ], 3, 1000);
            } else if (ext === 'json') {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (Array.isArray(data) && data.length > 0) {
                            const columns = Object.keys(data[0]).map(k => ({name: k, type: typeof data[0][k], nullable: true}));
                            showSchemaPreview(columns, data.slice(0, 5).map(Object.values), columns.length, data.length);
                        }
                    } catch (err) {
                        showResult('error', 'JSON解析失败');
                    }
                };
                reader.readAsText(file);
            }
        }

        function parseCSV(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const lines = text.split('\n').filter(l => l.trim());
                if (lines.length < 2) return;

                const headers = lines[0].split(',').map(h => h.trim());
                const data = lines.slice(1, 6).map(line => line.split(',').map(v => v.trim()));

                const columns = headers.map(h => ({name: h, type: 'string', nullable: true}));
                showSchemaPreview(columns, data, headers.length, lines.length - 1);
            };
            reader.readAsText(file);
        }

        function showSchemaPreview(columns, previewData, colCountVal, rowCountVal) {
            latestSchemaSnapshot = {
                columns,
                previewData,
                colCountVal,
                rowCountVal
            };
            schemaPlaceholder.classList.add('hidden');
            schemaContent.classList.remove('hidden');
            colCount.textContent = colCountVal;
            rowCount.textContent = rowCountVal;

            // Schema table
            schemaTableBody.innerHTML = columns.map(col => `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-3 font-medium text-slate-800">${col.name}</td>
                    <td class="px-4 py-3"><span class="px-2 py-1 bg-slate-100 rounded text-xs">${col.type}</span></td>
                    <td class="px-4 py-3">${col.nullable ? '<i class="fas fa-check text-green-500"></i>' : '<i class="fas fa-times text-red-500"></i>'}</td>
                </tr>
            `).join('');

            // Preview table
            previewHead.innerHTML = `<tr>${columns.map(col => `<th class="px-4 py-3 text-left font-semibold text-slate-700">${col.name}</th>`).join('')}</tr>`;
            previewBody.innerHTML = previewData.map(row => `
                <tr class="hover:bg-slate-50">${row.map(cell => `<td class="px-4 py-3 text-slate-600">${cell}</td>`).join('')}</tr>
            `).join('');
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedFile) return;

            progressContainer.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                progressBar.style.width = '35%';
                progressText.textContent = backendAvailable ? '连接后端中...' : '暂存到浏览器中...';

                if (backendAvailable) {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    formData.append('name', document.getElementById('name').value);
                    formData.append('description', document.getElementById('description').value);
                    formData.append('protocol_id', document.getElementById('protocolId').value);
                    formData.append('roundtable_id', document.getElementById('roundtableId').value);

                    const result = await api.fetchJson('/api/databases/upload', {
                        method: 'POST',
                        body: formData
                    });
                    progressBar.style.width = '100%';
                    progressText.textContent = '100%';
                    showResult('success', `上传成功！数据库ID: ${result.id}`);
                } else {
                    const record = await localStore.saveRecord({
                        kind: 'database',
                        title: document.getElementById('name').value,
                        description: document.getElementById('description').value,
                        protocolId: document.getElementById('protocolId').value,
                        roundtableId: document.getElementById('roundtableId').value,
                        file: selectedFile,
                        meta: latestSchemaSnapshot || {},
                    });
                    progressBar.style.width = '100%';
                    progressText.textContent = '100%';
                    showResult('success', `已暂存到浏览器本地：${record.title}`);
                }

                setTimeout(() => window.location.href = './data-dashboard.html?tab=databases', 1600);
            } catch (err) {
                showResult('error', '上传失败: ' + err.message);
                submitBtn.disabled = false;
                syncSubmitButton();
            }
        });

        function setBackendStatus(type, message) {
            backendStatus.className = 'mb-6 rounded-2xl px-5 py-4 text-sm';
            if (type === 'success') {
                backendStatus.classList.add('border', 'border-green-200', 'bg-green-50', 'text-green-800');
                backendStatus.querySelector('i').className = 'fas fa-server mt-0.5 text-green-500';
            } else if (type === 'error') {
                backendStatus.classList.add('border', 'border-red-200', 'bg-red-50', 'text-red-800');
                backendStatus.querySelector('i').className = 'fas fa-triangle-exclamation mt-0.5 text-red-500';
            } else {
                backendStatus.classList.add('border', 'border-amber-200', 'bg-amber-50', 'text-amber-800');
                backendStatus.querySelector('i').className = 'fas fa-server mt-0.5 text-amber-500';
            }
            backendStatusText.textContent = message;
        }

        function updateSubmitState() {
            syncSubmitButton();
        }

        function syncSubmitButton() {
            if (!selectedFile) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = backendAvailable
                    ? '<i class="fas fa-upload mr-2"></i>开始上传并解析'
                    : '<i class="fas fa-cloud mr-2"></i>暂存到浏览器并解析';
                return;
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = backendAvailable
                ? '<i class="fas fa-upload mr-2"></i>开始上传并解析'
                : '<i class="fas fa-cloud mr-2"></i>暂存到浏览器并解析';
        }

        function showResult(type, message) {
            resultMessage.classList.remove('hidden');
            resultMessage.className = `mt-6 p-4 rounded-xl ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            resultMessage.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
        }

        // Load dropdowns
        async function loadDropdowns() {
            if (!backendAvailable) {
                return;
            }
            try {
                const [protocols, roundtables] = await Promise.all([
                    api.fetchJson('/api/protocols?limit=100'),
                    api.fetchJson('/api/v1/roundtables')
                ]);

                const protocolSelect = document.getElementById('protocolId');
                protocolSelect.innerHTML = '<option value="">-- 选择方案 --</option>';
                protocols.forEach((protocol) => {
                    const option = document.createElement('option');
                    option.value = protocol.id;
                    option.textContent = protocol.title;
                    protocolSelect.appendChild(option);
                });

                const roundtableSelect = document.getElementById('roundtableId');
                roundtableSelect.innerHTML = '<option value="">-- 选择圆桌会 --</option>';
                roundtables.forEach((roundtable) => {
                    const option = document.createElement('option');
                    option.value = roundtable.id;
                    option.textContent = roundtable.title;
                    roundtableSelect.appendChild(option);
                });
            } catch (e) {
                console.warn('下拉数据加载失败:', e.message);
            }
        }

        async function checkBackend() {
            setBackendStatus('loading', `正在连接数据库服务：${api.API_BASE}`);
            try {
                await api.healthcheck();
                backendAvailable = true;
                setBackendStatus('success', `数据库上传服务已连接，当前接口地址：${api.API_BASE}`);
                updateSubmitState();
                await loadDropdowns();
            } catch (error) {
                backendAvailable = false;
                setBackendStatus('error', `数据库上传服务未连接：${error.message}。当前启用浏览器本地暂存模式，提交后只存在当前设备。`);
                updateSubmitState();
            }
        }

        checkBackend();
    </script>
</body>
</html>
