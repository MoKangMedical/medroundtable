<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 MedRoundTable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <main class="max-w-5xl mx-auto px-6 py-16">
        <a href="./index.html" class="inline-flex items-center gap-2 text-blue-300 font-medium mb-8">
            <i class="fas fa-arrow-left"></i> 返回功能首页
        </a>
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-10 shadow-2xl">
            <p class="text-sm uppercase tracking-[0.3em] text-blue-300 mb-4">About</p>
            <h1 class="text-4xl font-bold mb-6">MedRoundTable 是医学科研工作台，不只是聊天页。</h1>
            <div class="space-y-4 text-slate-300 leading-8">
                <p>平台以 14 位 AI 专家为核心，外接 40+ 生物医学数据库与 997 项技能能力面板，目标是把文献回顾、研究设计、数据分析和成果输出串成一条真实可执行的工作流。</p>
                <p>当前版本已经接入 STELLA 的 Manager-Dev-Critic 编排模式，并将 869 项 OpenClaw Medical Skills 包装进技能市场，方便在研究任务中直接路由。</p>
            </div>
            <div class="mt-8 flex flex-wrap gap-3">
                <a href="../experts.html" class="px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 transition">查看 AI 专家</a>
                <a href="../v2-features.html" class="px-5 py-3 rounded-xl bg-white/10 hover:bg-white/15 transition">查看 V2 功能</a>
            </div>
        </div>
    </main>
