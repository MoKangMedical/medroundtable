<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式 - MedRoundTable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <main class="max-w-4xl mx-auto px-6 py-16">
        <a href="./index.html" class="inline-flex items-center gap-2 text-blue-700 font-medium mb-8">
            <i class="fas fa-arrow-left"></i> 返回功能首页
        </a>
        <div class="bg-white rounded-3xl p-10 shadow-sm border border-slate-200">
            <h1 class="text-4xl font-bold mb-4">联系方式</h1>
            <p class="text-slate-600 mb-10">如果你需要对接合作、反馈产品问题或申请演示，可以优先使用下面这些入口。</p>
            <div class="grid md:grid-cols-2 gap-4">
                <a href="./feedback-v2.html" class="rounded-2xl border border-slate-200 p-6 hover:border-blue-400 transition">
                    <div class="font-semibold text-xl mb-2">产品反馈</div>
                    <div class="text-slate-600">提交页面问题、功能建议和 Bug 反馈。</div>
                </a>
                <a href="./login.html" class="rounded-2xl border border-slate-200 p-6 hover:border-blue-400 transition">
                    <div class="font-semibold text-xl mb-2">账号与接入</div>
                    <div class="text-slate-600">登录、注册或进入国内访问入口。</div>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
