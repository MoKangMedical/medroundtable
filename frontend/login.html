<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转到统一登录入口 - MedRoundTable</title>
    <script>
        setTimeout(() => {
            window.location.replace('../login.html');
        }, 900);
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
                linear-gradient(180deg, #eff6ff 0%, #f8fafc 55%, #ffffff 100%);
            color: #0f172a;
        }
        .shell {
            width: min(100%, 520px);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            padding: 32px 28px;
        }
        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #2563eb;
        }
        h1 {
            margin: 14px 0 0;
            font-size: 32px;
            line-height: 1.2;
        }
        p {
            margin: 14px 0 0;
            color: #475569;
            line-height: 1.8;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-secondary {
            background: #fff;
            color: #0f172a;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="eyebrow">统一登录入口</div>
        <h1>这里不再保留独立登录页</h1>
        <p>MedRoundTable 现在统一使用根登录页，避免同一个站点出现多套登录体验。页面将在 1 秒内自动跳转。</p>
        <div class="actions">
            <a class="btn btn-primary" href="../login.html">立即前往统一登录页</a>
            <a class="btn btn-secondary" href="../index.html">返回首页</a>
        </div>
    </div>
</body>
</html>
