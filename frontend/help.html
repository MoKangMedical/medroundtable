<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮助中心 - MedRoundTable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <main class="max-w-4xl mx-auto px-6 py-16">
        <a href="./index.html" class="inline-flex items-center gap-2 text-blue-700 font-medium mb-8">
            <i class="fas fa-arrow-left"></i> 返回功能首页
        </a>
        <h1 class="text-4xl font-bold mb-4">帮助中心</h1>
        <p class="text-lg text-slate-600 mb-10">如果你是第一次使用 MedRoundTable，建议按下面的顺序进入各功能页。</p>
        <div class="grid gap-4">
            <a href="./protocol-upload.html" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:border-blue-400 transition">
                <div class="font-semibold text-xl mb-2">1. 上传研究方案</div>
                <div class="text-slate-600">导入 PDF、Word、Markdown 或 TXT 方案，让系统先理解你的研究背景。</div>
            </a>
            <a href="./trial-designer.html" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:border-blue-400 transition">
                <div class="font-semibold text-xl mb-2">2. 进入试验设计</div>
                <div class="text-slate-600">补齐纳入排除标准、终点指标、样本量与设计逻辑。</div>
            </a>
            <a href="./analysis.html" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:border-blue-400 transition">
                <div class="font-semibold text-xl mb-2">3. 数据分析与报告</div>
                <div class="text-slate-600">进入统计分析、数据库联动和结果输出页面。</div>
            </a>
        </div>
    </main>
</body>
</html>
