version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medroundtable-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DEBUG=false
      - DATABASE_URL=sqlite:///app/data/medroundtable.db
      - SECRET_KEY=0a1267066319f509476a44ea41c17798df616b97f93882b7d5e6ed88c065b475
      - SECONDME_CLIENT_ID=19b5f08b-2256-41aa-b196-2f98491099f7
      - SECONDME_CLIENT_SECRET=f9f406e3d8dc4fe8e8363853865e1afea2957e7b0a33d75e96cbc5a22c4c20f3
      - SECONDME_REDIRECT_URI=http://localhost:8000/api/auth/callback
      - SECONDME_API_BASE=https://api.mindverse.com/gate/lab
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000,https://medroundtable-v2.vercel.app
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: medroundtable-network
