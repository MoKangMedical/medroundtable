<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedRoundTable - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem; color: white;
        }
        .logo h1 { font-size: 1.8rem; color: #1f2937; margin-bottom: 8px; font-weight: 700; }
        .logo p { color: #6b7280; font-size: 0.95rem; }
        
        .login-option {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .login-option:hover {
            border-color: #4f46e5;
            background: #f9fafb;
        }
        .login-option-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .secondme-icon { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .local-icon { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; }
        .guest-icon { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        
        .login-option-content { flex: 1; }
        .login-option-title { font-weight: 600; color: #1f2937; margin-bottom: 4px; }
        .login-option-desc { font-size: 0.85rem; color: #6b7280; }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: #e5e7eb;
        }
        .divider span {
            background: white; padding: 0 16px;
            color: #6b7280; font-size: 0.875rem;
            position: relative;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            color: #374151; font-weight: 500; font-size: 0.9rem;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e5e7eb; border-radius: 10px;
            font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: #4f46e5;
        }
        .btn {
            width: 100%; padding: 14px;
            border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        
        .back-link {
            text-align: center; margin-top: 20px;
        }
        .back-link a {
            color: #4f46e5; text-decoration: none; font-size: 0.9rem;
        }
        .back-link a:hover { text-decoration: underline; }
        
        .tabs {
            display: flex; margin-bottom: 20px;
            background: #f3f4f6; border-radius: 12px; padding: 4px;
        }
        .tab {
            flex: 1; padding: 10px; text-align: center;
            cursor: pointer; border-radius: 10px;
            font-weight: 500; color: #6b7280;
            transition: all 0.3s;
        }
        .tab.active {
            background: white; color: #4f46e5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .test-accounts {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 12px;
            margin-top: 16px;
            font-size: 0.85rem;
        }
        .test-accounts h4 { color: #374151; margin-bottom: 8px; font-size: 0.9rem; }
        .test-account { color: #6b7280; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🏥</div>
            <h1>MedRoundTable</h1>
            <p>医学科研协作平台</p>
        </div>

        <!-- 登录选项 -->
        <div id="login-options">
            <div class="login-option" onclick="loginWithSecondMe()">
                <div class="login-option-icon secondme-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="login-option-content">
                    <div class="login-option-title">Second Me 登录</div>
                    <div class="login-option-desc">使用 Second Me AI 身份登录</div>
                </div>
                <i class="fas fa-chevron-right" style="color: #9ca3af;"></i>
            </div>

            <div class="login-option" onclick="showLocalLogin()">
                <div class="login-option-icon local-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="login-option-content">
                    <div class="login-option-title">账号登录</div>
                    <div class="login-option-desc">使用邮箱和密码登录</div>
                </div>
                <i class="fas fa-chevron-right" style="color: #9ca3af;"></i>
            </div>

            <div class="login-option" onclick="loginAsGuest()">
                <div class="login-option-icon guest-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="login-option-content">
                    <div class="login-option-title">游客访问</div>
                    <div class="login-option-desc">无需登录，立即体验</div>
                </div>
                <i class="fas fa-chevron-right" style="color: #9ca3af;"></i>
            </div>
        </div>

        <!-- 本地登录表单 -->
        <div id="local-login-form" style="display: none;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
            </div>

            <!-- 登录 -->
            <div id="login-tab" class="tab-content active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="login-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                
                <div class="test-accounts">
                    <h4><i class="fas fa-info-circle"></i> 测试账号</h4>
                    <div class="test-account">管理员: admin@medroundtable.com / admin123</div>
                    <div class="test-account">研究员: researcher@medroundtable.com / research123</div>
                </div>
            </div>

            <!-- 注册 -->
            <div id="register-tab" class="tab-content">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="register-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="register-password" placeholder="设置密码（至少6位）" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="register-confirm" placeholder="再次输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary">注册</button>
                </form>
            </div>

            <div class="back-link">
                <a href="./login.html" onclick="showLoginOptions(); return false;">
                    <i class="fas fa-arrow-left"></i> 返回登录选项
                </a>
            </div>
        </div>

        <div class="back-link" style="margin-top: 24px;">
            <a href="./index.html">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <span style="margin: 0 10px; color: #ccc;">|</span>
            <a href="./sitemap.html">
                <i class="fas fa-sitemap"></i> 网站地图
            </a>
        </div>
    </div>

    <script>
        // Second Me OAuth 配置
        const SECOND_ME_CONFIG = {
            clientId: '19b5f08b-2256-41aa-b196-2f98491099f7',
            redirectUri: window.location.origin + '/login.html',
            authUrl: 'https://go.second.me/oauth/authorize',
            scope: 'profile shades softmemory'
        };

        // Second Me 登录
        function loginWithSecondMe() {
            const params = new URLSearchParams({
                client_id: SECOND_ME_CONFIG.clientId,
                redirect_uri: SECOND_ME_CONFIG.redirectUri,
                response_type: 'code',
                scope: SECOND_ME_CONFIG.scope,
                state: generateState()
            });
            
            // 保存当前页面用于返回
            localStorage.setItem('login_return_url', document.referrer || './index.html');
            
            // 跳转到 Second Me 授权页面
            window.location.href = `${SECOND_ME_CONFIG.authUrl}?${params.toString()}`;
        }

        // 生成 state 参数防止 CSRF
        function generateState() {
            const state = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('oauth_state', state);
            return state;
        }

        // 处理 OAuth 回调
        function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const savedState = localStorage.getItem('oauth_state');
            
            if (code && state === savedState) {
                // 清除 state
                localStorage.removeItem('oauth_state');
                
                // 保存登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginType', 'secondme');
                localStorage.setItem('authCode', code);
                
                // 显示成功消息
                alert('Second Me 登录成功！');
                
                // 返回原页面或首页
                const returnUrl = localStorage.getItem('login_return_url') || './index.html';
                window.location.href = returnUrl;
                return true;
            }
            return false;
        }

        // 页面加载时检查是否是 OAuth 回调
        if (handleOAuthCallback()) {
            // 已处理回调，停止执行
        }

        // 显示本地登录表单
        function showLocalLogin() {
            document.getElementById('login-options').style.display = 'none';
            document.getElementById('local-login-form').style.display = 'block';
        }

        // 显示登录选项
        function showLoginOptions() {
            document.getElementById('login-options').style.display = 'block';
            document.getElementById('local-login-form').style.display = 'none';
        }

        // 游客登录
        function loginAsGuest() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loginType', 'guest');
            localStorage.setItem('user', JSON.stringify({
                name: '游客用户',
                email: 'guest@medroundtable.com',
                role: 'guest'
            }));
            alert('欢迎，游客用户！');
            window.location.href = './index.html';
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
        }

        // 处理登录
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // 测试账号验证
            const testAccounts = {
                'admin@medroundtable.com': 'admin123',
                'researcher@medroundtable.com': 'research123'
            };
            
            if (testAccounts[email] === password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginType', 'local');
                localStorage.setItem('user', JSON.stringify({
                    name: email.split('@')[0],
                    email: email,
                    role: email.includes('admin') ? 'admin' : 'researcher'
                }));
                alert('登录成功！');
                window.location.href = './index.html';
            } else {
                alert('邮箱或密码错误！');
            }
        }

        // 处理注册
        function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            
            if (password !== confirm) {
                alert('两次输入的密码不一致！');
                return;
            }
            
            if (password.length < 6) {
                alert('密码长度至少6位！');
                return;
            }
            
            // 保存用户信息
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                alert('该邮箱已注册！');
                return;
            }
            
            users.push({ email, password, name: email.split('@')[0] });
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('注册成功！请登录。');
            switchTab('login');
        }
    </script>
</body>
</html>
