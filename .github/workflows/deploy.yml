# =============================================================================
# MedRoundTable - Zeabur自动部署工作流
# =============================================================================
# 触发条件: push到main分支 或 手动触发
# 功能: 自动构建并部署到Zeabur平台
# =============================================================================

name: 🚀 Deploy to Zeabur

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/*.yml'
      - '!.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# 权限配置
permissions:
  contents: read
  packages: write

# 并发控制 - 防止同时部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ZEABUR_PROJECT_ID: ${{ secrets.ZEABUR_PROJECT_ID }}
  ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}

jobs:
  # ==========================================================================
  # 阶段1: 预检查
  # ==========================================================================
  precheck:
    name: 🔍 部署前检查
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查关键文件
        id: check
        run: |
          echo "🔍 检查关键文件..."
          
          # 检查必需文件
          REQUIRED_FILES=("Dockerfile" "requirements.txt" "backend/main.py")
          MISSING=0
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ 缺失文件: $file"
              MISSING=$((MISSING + 1))
            else
              echo "✅ 找到: $file"
            fi
          done
          
          if [ $MISSING -gt 0 ]; then
            echo "❌ 发现 $MISSING 个缺失文件，终止部署"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # 检查Python语法
          echo "🐍 检查Python语法..."
          python3 -m py_compile backend/main.py
          if [ $? -eq 0 ]; then
            echo "✅ Python语法检查通过"
          else
            echo "❌ Python语法检查失败"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "should_deploy=true" >> $GITHUB_OUTPUT
          echo "✅ 所有预检查通过"

  # ==========================================================================
  # 阶段2: 构建Docker镜像
  # ==========================================================================
  build:
    name: 🐳 构建Docker镜像
    runs-on: ubuntu-latest
    needs: precheck
    if: needs.precheck.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 扫描镜像漏洞
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # 不中断部署，仅报告

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================================================
  # 阶段3: 部署到Zeabur
  # ==========================================================================
  deploy:
    name: 🚀 部署到Zeabur
    runs-on: ubuntu-latest
    needs: [precheck, build]
    if: needs.precheck.outputs.should_deploy == 'true'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zeabur CLI
        run: |
          npm install -g zeabur
          zeabur --version

      - name: 配置Zeabur认证
        run: |
          echo "${{ secrets.ZEABUR_TOKEN }}" | zeabur auth login --token-stdin

      - name: 部署到Zeabur
        id: deploy
        run: |
          echo "🚀 开始部署到Zeabur..."
          
          # 设置项目
          export ZEABUR_PROJECT_ID="${{ secrets.ZEABUR_PROJECT_ID }}"
          
          # 执行部署
          DEPLOY_OUTPUT=$(zeabur deploy --project "${ZEABUR_PROJECT_ID}" 2>&1)
          DEPLOY_STATUS=$?
          
          echo "$DEPLOY_OUTPUT"
          
          if [ $DEPLOY_STATUS -eq 0 ]; then
            echo "✅ Zeabur部署成功"
            
            # 提取部署URL
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.zeabur\.app' | head -1)
            if [ -z "$DEPLOY_URL" ]; then
              DEPLOY_URL="https://${ZEABUR_PROJECT_ID}.zeabur.app"
            fi
            
            echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "🔗 部署URL: $DEPLOY_URL"
          else
            echo "❌ Zeabur部署失败"
            exit 1
          fi

      - name: 健康检查
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          echo "🏥 执行健康检查: $DEPLOY_URL"
          
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/health" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 健康检查通过 (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ 等待服务启动... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 10
          done
          
          echo "❌ 健康检查失败，服务未正常启动"
          exit 1

      - name: 回滚准备
        if: failure()
        run: |
          echo "⚠️ 部署失败，准备回滚..."
          # 这里可以添加回滚逻辑
          # zeabur rollback --project "${ZEABUR_PROJECT_ID}"

  # ==========================================================================
  # 阶段4: 部署通知
  # ==========================================================================
  notify:
    name: 📢 发送通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: 发送Slack通知
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            🚀 MedRoundTable 部署 ${{ job.status == 'success' && '成功 ✅' || '失败 ❌' }}
            
            环境: ${{ github.event.inputs.environment || 'production' }}
            版本: ${{ github.sha }}
            部署者: ${{ github.actor }}
            ${{ job.status == 'success' && format('访问链接: {0}', needs.deploy.outputs.deploy_url) || '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 发送Discord通知
        if: secrets.DISCORD_WEBHOOK_URL != ''
        uses: tsickert/discord-webhook@v5
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            🚀 **MedRoundTable 部署 ${{ job.status == 'success' && '成功' || '失败' }}**
            
            环境: `${{ github.event.inputs.environment || 'production' }}`
            提交: `${{ github.sha }}`
            部署者: ${{ github.actor }}
            ${{ job.status == 'success' && format('🌐 访问: {0}', needs.deploy.outputs.deploy_url) || '' }}

  # ==========================================================================
  # 阶段5: 创建GitHub Release (可选)
  # ==========================================================================
  release:
    name: 🏷️ 创建Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 生成Release Notes
        id: release_notes
        run: |
          # 获取最近的tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # 如果没有tag，获取所有提交
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # 获取从上一次tag到现在的提交
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        if: steps.release_notes.outputs.changelog != ''
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 部署版本 v${{ github.run_number }}
            
            ### 变更日志
            ${{ steps.release_notes.outputs.changelog }}
            
            ### 部署信息
            - 环境: Production
            - 镜像: ${{ needs.build.outputs.image_tag }}
            - 提交: ${{ github.sha }}
            
            ### 访问链接
            - 生产环境: ${{ needs.deploy.outputs.deploy_url }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
