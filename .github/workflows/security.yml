# =============================================================================
# MedRoundTable - 安全扫描工作流
# =============================================================================
# 触发条件: 定时运行(每周)、PR、push到main分支
# 功能: 依赖漏洞扫描、代码安全扫描、密钥泄露检测
# =============================================================================

name: 🔒 Security Scan

on:
  # 定时运行 - 每周一凌晨2点
  schedule:
    - cron: '0 2 * * 1'
  
  # PR触发
  pull_request:
    branches: [ main, master ]
  
  # Push到main分支触发
  push:
    branches: [ main, master ]
    paths:
      - 'requirements.txt'
      - 'package*.json'
      - 'Pipfile*'
      - 'poetry.lock'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      scan_type:
        description: '扫描类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dependencies-only
          - code-only
          - secrets-only

# 权限最小化
permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # 阶段1: 依赖漏洞扫描
  # ==========================================================================
  dependency-scan:
    name: 📦 依赖漏洞扫描
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies-only' || github.event.inputs.scan_type == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于更好的扫描

      # -------------------- Python依赖扫描 --------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit pip-audit
          pip install -r requirements.txt

      - name: Run Safety check
        id: safety
        run: |
          echo "🔍 Running Safety vulnerability scan..."
          safety check -r requirements.txt --json --output safety-report.json || true
          safety check -r requirements.txt --full-report || true
        continue-on-error: true

      - name: Run pip-audit
        id: pip_audit
        run: |
          echo "🔍 Running pip-audit..."
          pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
          pip-audit -r requirements.txt || true
        continue-on-error: true

      # -------------------- Node.js依赖扫描 --------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check and scan Node.js dependencies
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend
            if [ -f "package-lock.json" ]; then
              echo "🔍 Running npm audit..."
              npm audit --audit-level=moderate || true
            fi
          fi

      # -------------------- Snyk扫描 --------------------
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-python.sarif
        continue-on-error: true

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        if: env.SNYK_TOKEN != ''
        with:
          sarif_file: snyk-python.sarif

      # -------------------- 上传报告 --------------------
      - name: Upload dependency scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            safety-report.json
            pip-audit-report.json
            snyk-python.sarif
          retention-days: 30

  # ==========================================================================
  # 阶段2: 代码安全扫描 (Bandit)
  # ==========================================================================
  code-scan-bandit:
    name: 🐍 Bandit代码安全扫描
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code-only' || github.event.inputs.scan_type == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit bandit-sarif-formatter

      - name: Run Bandit scan
        run: |
          echo "🔍 Running Bandit security scan..."
          bandit -r backend/ agents/ \
            -f sarif \
            -o bandit-results.sarif \
            --exclude './venv,./.venv,./env,./__pycache__,./tests' \
            -ll || true
          
          # 同时生成文本报告
          bandit -r backend/ agents/ \
            -f txt \
            -o bandit-report.txt \
            --exclude './venv,./.venv,./env,./__pycache__,./tests' \
            -ll || true

      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: |
            bandit-results.sarif
            bandit-report.txt
          retention-days: 30

  # ==========================================================================
  # 阶段3: GitHub CodeQL分析
  # ==========================================================================
  codeql-analysis:
    name: 🔬 CodeQL分析
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code-only' || github.event.inputs.scan_type == null
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # ==========================================================================
  # 阶段4: 密钥泄露检测
  # ==========================================================================
  secret-scan:
    name: 🔑 密钥泄露检测
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'secrets-only' || github.event.inputs.scan_type == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史来检测密钥

      # -------------------- GitLeaks --------------------
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      # -------------------- TruffleHog --------------------
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      # -------------------- 自定义密钥扫描 --------------------
      - name: Custom secret scan
        run: |
          echo "🔍 Running custom secret patterns scan..."
          
          # 定义要扫描的模式
          PATTERNS=(
            "sk-[a-zA-Z0-9]{48}"  # OpenAI API key
            "ghp_[a-zA-Z0-9]{36}"  # GitHub PAT
            "AKIA[0-9A-Z]{16}"     # AWS Access Key
            "[0-9a-f]{32}"         # Generic 32-char hex (可能的API key)
          )
          
          FOUND_SECRETS=0
          
          for pattern in "${PATTERNS[@]}"; do
            echo "Checking pattern: $pattern"
            matches=$(grep -r -n "$pattern" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" --include="*.yaml" . 2>/dev/null | grep -v "node_modules" | grep -v "__pycache__" | grep -v ".git" || true)
            
            if [ ! -z "$matches" ]; then
              echo "⚠️ 可能的密钥泄露:"
              echo "$matches"
              FOUND_SECRETS=$((FOUND_SECRETS + 1))
            fi
          done
          
          # 检查.env文件是否被提交
          if git ls-files | grep -q "\.env$"; then
            echo "❌ 发现.env文件被提交到仓库!"
            git ls-files | grep "\.env$"
            FOUND_SECRETS=$((FOUND_SECRETS + 1))
          fi
          
          if [ $FOUND_SECRETS -gt 0 ]; then
            echo "❌ 发现 $FOUND_SECRETS 个潜在密钥泄露"
            exit 1
          fi
          
          echo "✅ 密钥泄露检查通过"

  # ==========================================================================
  # 阶段5: Docker镜像扫描
  # ==========================================================================
  docker-scan:
    name: 🐳 Docker镜像扫描
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t medroundtable:security-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'medroundtable:security-scan'
          format: 'sarif'
          output: 'trivy-docker-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # 不中断工作流，仅报告

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-docker-results.sarif
          category: trivy-docker

      - name: Run Trivy (table format for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'medroundtable:security-scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ==========================================================================
  # 阶段6: 基础设施安全扫描
  # ==========================================================================
  infra-scan:
    name: 🏗️ 基础设施安全扫描
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == null
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        if: hashFiles('**/*.tf') != '' || hashFiles('**/docker-compose*.yml') != '' || hashFiles('**/Dockerfile') != ''
        with:
          directory: .
          framework: all
          output_format: sarif
          output_file_path: reports/checkov.sarif
          soft_fail: true
        continue-on-error: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('reports/checkov.sarif') != ''
        with:
          sarif_file: reports/checkov.sarif
          category: checkov

  # ==========================================================================
  # 阶段7: 安全汇总报告
  # ==========================================================================
  security-summary:
    name: 📝 安全扫描汇总
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan-bandit, codeql-analysis, secret-scan, docker-scan, infra-scan]
    if: always()
    
    steps:
      - name: 生成安全报告
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = [
              { name: '依赖漏洞扫描', result: '${{ needs.dependency-scan.result }}' },
              { name: 'Bandit代码扫描', result: '${{ needs.code-scan-bandit.result }}' },
              { name: 'CodeQL分析', result: '${{ needs.codeql-analysis.result }}' },
              { name: '密钥泄露检测', result: '${{ needs.secret-scan.result }}' },
              { name: 'Docker镜像扫描', result: '${{ needs.docker-scan.result }}' },
              { name: '基础设施扫描', result: '${{ needs.infra-scan.result }}' }
            ];
            
            let summary = '## 🔒 安全扫描报告\n\n';
            summary += '| 扫描项 | 状态 |\n';
            summary += '|--------|------|\n';
            
            let hasFailure = false;
            jobs.forEach(job => {
              const icon = job.result === 'success' ? '✅' : 
                          job.result === 'failure' ? '❌' : 
                          job.result === 'skipped' ? '⏭️' : '⚠️';
              summary += `| ${job.name} | ${icon} ${job.result} |\n`;
              if (job.result === 'failure') hasFailure = true;
            });
            
            summary += '\n';
            summary += hasFailure 
              ? '❌ **发现安全问题，请查看详细报告**\n' 
              : '✅ **所有安全检查通过**\n';
            summary += '\n详细报告可在 Security > Code scanning alerts 查看';
            
            core.setOutput('summary', summary);
            
            // 在PR中添加评论
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: 安全扫描状态
        run: |
          echo "=========================================="
          echo "🔒 安全扫描完成"
          echo "=========================================="
          echo "依赖扫描: ${{ needs.dependency-scan.result }}"
          echo "Bandit扫描: ${{ needs.code-scan-bandit.result }}"
          echo "CodeQL分析: ${{ needs.codeql-analysis.result }}"
          echo "密钥检测: ${{ needs.secret-scan.result }}"
          echo "Docker扫描: ${{ needs.docker-scan.result }}"
          echo "基础设施扫描: ${{ needs.infra-scan.result }}"
          echo "=========================================="
          
          # 如果关键扫描失败，则标记失败
          if [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            echo "❌ 密钥泄露检测失败"
            exit 1
          fi
